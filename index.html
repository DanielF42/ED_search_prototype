<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Lessons</title>

<style>
*{
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    margin:0;
    background:#fff;
}

.header{
    text-align:center;
    font-size:28px;
    color:#333;
    padding:28px;
    border-bottom:1px solid #ddd;
}

.toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 36px;
}

.search{
    width:245px;
    height:30px;
    border:1px solid #d7d7d7;
    border-radius:18px;
    padding-left:35px;
    outline:none;
    background:
        url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18'>\
<circle cx='8' cy='8' r='5' stroke='%23999' fill='none' stroke-width='2'/>\
<line x1='12' y1='12' x2='17' y2='17' stroke='%23999' stroke-width='2'/>\
</svg>")
        no-repeat 12px center;
}

.refresh{
    color:#0067ff;
    cursor:pointer;
    font-size:14px;
}

.lesson-list{
    margin:0 36px;
    border-top:1px solid #e5e5e5;
}

.lesson{
    display:flex;
    align-items:center;
    height:42px;
    border-bottom:1px solid #ededed;
    cursor:pointer;
    transition:.15s;
}

.lesson:hover{
    background:#f8f9fb;
}

.icon{
    width:28px;
    height:28px;
    margin-right:18px;
    background:#58c8f4;
    border-radius:3px;
    position:relative;
}

.icon:before{
    content:"";
    position:absolute;
    left:7px;
    top:6px;
    width:14px;
    height:16px;
    background:white;
}

.icon:after{
    content:"";
    position:absolute;
    left:10px;
    top:10px;
    width:8px;
    height:1px;
    background:#58c8f4;
    box-shadow:
        0 3px #58c8f4,
        0 6px #58c8f4,
        0 9px #58c8f4;
}

.check{
    color:#2da54a;
    margin-right:18px;
    font-weight:bold;
}

.title{
    font-size:18px;
    color:#222;
}
</style>

</head>

<body>

<div class="header">
    Lessons
</div>

<div class="toolbar">
    <input class="search" placeholder="Search lessons">
    <div class="refresh">⟳ Refresh</div>
</div>

<div class="lesson-list">

<div class="lesson">
<div class="icon"></div>
<div class="check">✓</div>
<div class="title">Welcome to CS6750: Human-Computer Interaction!</div>
</div>

<div class="lesson">
<div class="icon"></div>
<div class="check">✓</div>
<div class="title">1.1: Introduction to HCI</div>
</div>

<div class="lesson">
<div class="icon"></div>
<div class="check">✓</div>
<div class="title">1.2: Introduction to CS6750</div>
</div>

<div class="lesson">
<div class="icon"></div>
<div class="check">✓</div>
<div class="title">1.3: Exploring HCI</div>
</div>

<div class="lesson">
<div class="icon"></div>
<div class="check">✓</div>
<div class="title">2.1: Introduction to Principles</div>
</div>

<div class="lesson">
<div class="icon"></div>
<div class="check">✓</div>
<div class="title">2.2: Feedback Cycles</div>
</div>

</div>

</body>
</html>
